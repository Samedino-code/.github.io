<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Coming Soon | Angewandte Informatik</title>
    <style>
        /* Modernes, dunkles Tech-Design */
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: '-apple-system', BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background-color: #0f172a; /* Dunkelblaues Slate-Design */
            color: #f8fafc;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            overflow: hidden;
        }

        .container {
            text-align: center;
            padding: 2rem;
            max-width: 600px;
        }

        /* Ein dezenter, stylischer Tech-Badge */
        .badge {
            background-color: rgba(59, 130, 246, 0.1);
            color: #3b82f6;
            padding: 0.5rem 1rem;
            border-radius: 9999px;
            font-size: 0.875rem;
            font-weight: 600;
            letter-spacing: 0.05em;
            text-transform: uppercase;
            display: inline-block;
            margin-bottom: 1.5rem;
            border: 1px solid rgba(59, 130, 246, 0.2);
        }

        h1 {
            font-size: 3rem;
            font-weight: 800;
            margin-bottom: 1rem;
            background: linear-gradient(to right, #3b82f6, #60a5fa, #a78bfa);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        p {
            font-size: 1.125rem;
            color: #94a3b8;
            line-height: 1.6;
            margin-bottom: 2rem;
        }

        /* Ein kleiner animierter Ladebalken für den Tech-Look */
        .loading-bar {
            width: 150px;
            height: 4px;
            background-color: #1e293b;
            border-radius: 2px;
            margin: 0 auto;
            position: relative;
            overflow: hidden;
        }

        .loading-bar::after {
            content: '';
            position: absolute;
            left: 0;
            top: 0;
            height: 100%;
            width: 40px;
            background-color: #3b82f6;
            border-radius: 2px;
            animation: loading 1.8s infinite ease-in-out;
        }

        @keyframes loading {
            0% { left: -40px; }
            100% { left: 150px; }
        }
    </style>
</head>
<body>

    <div class="container">
        <div class="badge">Duales Studium 2027</div>
        <h1>Coming Soon</h1>
        <p>Hier entsteht in Kürze das digitale Portfolio für Angewandte Informatik. Code, Projekte und Visionen sind bereits im Deployment.</p>
        <div class="loading-bar"></div>
    </div>

</body>
</html>
